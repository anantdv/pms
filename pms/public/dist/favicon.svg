<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" fill="#000000" rx="12"/>
  <!-- Base yellow circle -->
  <circle cx="50" cy="50" r="36" fill="#FFDD00"/>
  <!-- Cutout quadrant on the right side (from 315 deg to 45 deg) -->
  <polygon points="50,50 86,14 100,14 100,86 86,86" fill="#000000"/>
  <!-- Splitting line from bottom-left edge to center -->
  <line x1="24" y1="76" x2="50" y2="50" stroke="#000000" stroke-width="5.5" stroke-linecap="round"/>
</svg>